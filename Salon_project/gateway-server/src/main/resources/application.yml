server:
  port: 8087

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/auth/**,api/admin/users/**,/users/**

        - id: salon-service
          uri: lb://salon-service
          predicates:
            - Path=/api/salons/** ,/salons/**,/api/admin/salons/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/booking/**

        - id: service-offering
          uri: lb://service-offering
          predicates:
            - Path=/api/serviceoffering/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/api/categories/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka/

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true